    <main>
        <header>
            <div class="header">
                <div class="logo">
                    <img src="./images/logo.png" alt="logo-img" height="40px">

                        <span>Academy</span>
                    </h2>
                </div>
                <nav>
                    <ul>
                        <li><a href="index.html" id="active">HOME</a></li>

                    </ul>
                </nav>
                <!-- <button onclick="window.location.href='index.html'">HOME</button> -->

                    <div class="line"></div>
                </div>
            </div>
        </header>

                <a href="index.html">HOME</a>

                <a href="signup.html">ACCOUNT</a>
            </div>
        </div>

        <div class="form">
            <h2>Sign Up</h2>

            <form id="form">

                <div class="form-control">
                    <label for="fullName" id="name">Full Name</label>
                    <input type="text" id="fullName" name="full_name" onclick="firstFocus()"/>
                </div>

                <div class="form-control">
                    <label for="emailAddress" id="email">Email</label>
                    <input type="email" id="emailAddress" name="email"/>
                </div>

                <div class="form-control">
                    <label for="phoneNo" id="phone">Phone no</label>
                    <input type="number" id="phoneNo" name="phone"/>
                </div>

                <div class="agree">
                    <input type="checkbox" id="terms">
                    <label for="terms">By signing up, I agree to code with FreddyCodz Academy's 
                        <a href="policy.html">Privacy</a> &
                        <a href="terms.html">Terms</a>
                    </label>
                </div>

                <label id="error"></label>

                <div class="button">
                    <button>Register</button>
                </div>

                <p id="already">Already have an account?
                    <span id="login" onclick="">Login</span>
                </p>

            </form>
        </div>
    </main>
